---
services:

  ghost:
    image: jahrik/arm-ghost:latest
    ports:
      - 8083:2368
    networks:
      - traefik
    volumes:
      - /mnt/g1/ghost/content:/var/lib/ghost/content
      - /mnt/g1/ghost/config.production.json:/var/lib/ghost/config.production.json
    environment:
      url: 'http://homelab.business'
      database__client: mysql
      database__connection__host: "${DB_HOST}"
      database__connection__user: "${DB_USER}"
      database__connection__password: "${DB_PASS}"
      database__connection__database: "${DATABASE}"
      mail_transport: "SMTP"
      mail_options_service: "${MAIL_SRVC}"
      mail_options_auth_user: "${MAIL_USER}"
      mail_options_auth_pass: "${MAIL_PASS}"
    deploy:
      labels:
        traefik.enable: 1
        traefik.port: 2368
        traefik.backend: ghost
        traefik.docker.network: traefik
        traefik.frontend.rule: Host:homelab.business
        traefik.frontend.entryPoints: https

  jahrik:
    image: jahrik/arm-ghost:latest
    environment:
      url: 'http://jahrik.me'
    ports:
      - 8085:2368
    networks:
      - traefik
    deploy:
      labels:
        traefik.enable: 1
        traefik.port: 2368
        traefik.backend: jahrik
        traefik.docker.network: traefik
        traefik.frontend.rule: Host:jahrik.me
        traefik.frontend.entryPoints: https

networks:
  traefik:
    name: traefik
    driver: overlay
    external: true
